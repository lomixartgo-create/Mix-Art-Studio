<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thank You — Mix Art Design</title>
  <style>
    :root { --ink:#181419; --gold:#ffd35a; --pink:#ff5ca8; --cream:#fffaf2; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family: Arial, Helvetica, sans-serif; background: radial-gradient(circle at top left, rgba(255,92,168,.25), transparent 34%), linear-gradient(135deg, #181419, #302437); color:white; padding:24px; }
    main { max-width:720px; background:rgba(255,255,255,.09); border:1px solid rgba(255,255,255,.16); border-radius:32px; padding:38px; box-shadow:0 28px 70px rgba(0,0,0,.28); }
    h1 { margin:0 0 12px; font-size:clamp(2rem, 7vw, 4rem); line-height:.95; }
    p { font-size:1.1rem; line-height:1.6; color:rgba(255,255,255,.82); }
    a { display:inline-block; margin-top:18px; background:var(--gold); color:var(--ink); text-decoration:none; font-weight:800; padding:14px 18px; border-radius:999px; }
  </style>
</head>
<body>
  <main>
    <h1>Thanks — your request was sent.</h1>
    <p>Mix Art Design received your quote request. We will reply by email with questions, timing, and next steps.</p>
    <a href="https://mixartdesign.ca/">Back to Mix Art Design</a>
